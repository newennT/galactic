<main class="container">
    <h1>{{ isEditMode ? 'Modifier l\'utilisateur' : 'Créer un nouvel utilisateur' }}</h1>

    <form [formGroup]="userForm" (ngSubmit)="onSubmit()">
        <mat-form-field appearance="outline">
            <mat-label>Pseudo</mat-label>
            <input matInput type="text" formControlName="username">
            <mat-error *ngIf="userForm.get('username')?.invalid && userForm.get('username')?.touched">
                Pseudo invalide (min 3 caractères)
            </mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline">
            <mat-label>Email</mat-label>
            <input matInput type="email" formControlName="email">
            <mat-error *ngIf="userForm.get('email')?.invalid && userForm.get('email')?.touched">
                Email invalide
            </mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline">
            <mat-label>Mot de passe</mat-label>
            <input matInput type="password" formControlName="password">
            <mat-error *ngIf="userForm.get('password')?.invalid && userForm.get('password')?.touched && !isEditMode">
                Obligatoire pour création
            </mat-error>
        </mat-form-field>

            <mat-label>Admin</mat-label>
            <mat-checkbox formControlName="is_admin"></mat-checkbox>

        <button mat-raised-button color="primary" type="submit" [disabled]="userForm.invalid">
            Enregistrer
        </button>

    </form>
</main>
