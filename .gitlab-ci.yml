stages:
  - build
  - docker

build_frontend:
  image: node:18
  stage: build
  script:
    - cd frontend
    - npm ci
    - npm run build
  artifacts:
    paths:
      - frontend/dist/

docker_frontend:
  image: docker:24
  services:
    - docker:dind
  stage: docker
  variables:
    DOCKER_TLS_CERTDIR: ""
  script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" $CI_REGISTRY
    - docker build -t $CI_REGISTRY_IMAGE/frontend:latest frontend
    - docker push $CI_REGISTRY_IMAGE/frontend:latest